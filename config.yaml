# ── mcphost config ────────────────────────────────────────────────────────────
# Save as: ~/.config/mcphost/config.yaml
# Run with: mcphost --config ~/.config/mcphost/config.yaml
#
# mcphost is the runtime host (mark3labs/mcphost) — it loads the LLM and wires
# it to your MCP servers. You build the server; mcphost handles orchestration.
# ──────────────────────────────────────────────────────────────────────────────

mcpServers:
  agama:
    # agama-mcp runs over HTTP/SSE transport (same as mcp-bugzilla)
    # Start the server first: uv run mcp-agama --agama-server http://localhost/api
    url: "http://127.0.0.1:8000/mcp"

# Optional: add other MCP servers alongside agama-mcp
# mcp-bugzilla is a natural companion for the openSUSE ecosystem:
#   bugzilla:
#     url: "http://127.0.0.1:8001/mcp"

---
